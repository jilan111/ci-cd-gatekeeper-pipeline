name: MLOps Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  linter:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run simple lint check
        run: |
          echo "Running lint check..."
          echo "Lint passed"

  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: linter

    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate training
        run: |
          echo "Training model..."
          echo "Training done"

      - name: Create error log
        if: failure()
        run: |
          echo "Training failed" > error_logs.txt

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
